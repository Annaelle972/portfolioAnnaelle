<script>
/* ── Génère la heatmap ── */
(function buildHeatmap() {
  const grid = document.getElementById('heatmap-grid');
  if (!grid) return;

  // Niveaux d'activité simulés sur 52 semaines × 7 jours
  // Pics sur les périodes de projets / stages
  const activity = [];
  for (let w = 0; w < 53; w++) {
    for (let d = 0; d < 7; d++) {
      let level = 0;
      const r = Math.random();
      // Périodes actives : semaines 10-18 (S1 projets), 28-36 (stage Argitik), 42-52 (S2 projets)
      if ((w >= 10 && w <= 18) || (w >= 28 && w <= 36) || (w >= 42 && w <= 52)) {
        level = r < .12 ? 0 : r < .30 ? 1 : r < .55 ? 2 : r < .80 ? 3 : 4;
      } else {
        level = r < .45 ? 0 : r < .70 ? 1 : r < .88 ? 2 : r < .97 ? 3 : 4;
      }
      activity.push(level);
    }
  }

  const frag = document.createDocumentFragment();
  activity.forEach(level => {
    const cell = document.createElement('span');
    cell.className = 'gh-cell';
    cell.dataset.level = level;
    cell.title = level === 0 ? 'Aucun commit' : `${level * 2 + Math.floor(Math.random()*3)} commits`;
    frag.appendChild(cell);
  });
  grid.appendChild(frag);
})();

/* ── Compteurs animés ── */
(function initCounters() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.querySelectorAll('.gh-stat-val[data-target]').forEach(el => {
        const target = parseInt(el.dataset.target);
        const duration = 1400;
        const start = performance.now();
        function step(now) {
          const progress = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - progress, 3);
          el.textContent = target >= 1000
            ? Math.floor(ease * target).toLocaleString('fr-FR')
            : Math.floor(ease * target);
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
      observer.disconnect();
    });
  }, { threshold: .3 });
  const section = document.getElementById('github');
  if (section) observer.observe(section);
})();

/* ── Barres de langages animées ── */
(function initLangBars() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.querySelectorAll('.gh-lang-fill[data-w]').forEach((bar, i) => {
        setTimeout(() => {
          bar.style.width = bar.dataset.w + '%';
        }, i * 120);
      });
      observer.disconnect();
    });
  }, { threshold: .3 });
  const section = document.getElementById('github');
  if (section) observer.observe(section);
})();
</script>
