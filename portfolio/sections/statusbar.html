<!-- ══════ STATUS BAR VS CODE ══════
     fichier : sections/statusbar.html
     Barre fixe en bas de page, style éditeur
     ══════════════════════════════════════ -->
<div id="vsc-bar">

  <!-- Côté gauche -->
  <div class="vsb-left">

    <span class="vsb-item vsb-branch">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
      main
    </span>

    <span class="vsb-sep">|</span>

    <span class="vsb-item vsb-sync">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
      0↓ 0↑
    </span>

    <span class="vsb-sep">|</span>

    <span class="vsb-item vsb-errors">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      0 &nbsp;
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      0
    </span>

  </div>

  <!-- Côté droit -->
  <div class="vsb-right">

    <span class="vsb-item" id="vsb-scroll-pos">Ln 1, Col 1</span>

    <span class="vsb-sep">|</span>

    <span class="vsb-item">UTF-8</span>

    <span class="vsb-sep">|</span>

    <span class="vsb-item vsb-lang">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span id="vsb-lang-name">HTML</span>
    </span>

    <span class="vsb-sep">|</span>

    <span class="vsb-item vsb-spaces">Spaces: 2</span>

    <span class="vsb-sep">|</span>

    <span class="vsb-item vsb-live">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
      Live
    </span>

    <span class="vsb-sep">|</span>

    <span class="vsb-item vsb-notif" id="vsb-time">00:00</span>

  </div>

</div>

<script>
/* ── Status bar — logique ── */
(function initStatusBar() {

  /* Horloge */
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const el = document.getElementById('vsb-time');
    if (el) el.textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  /* Position de scroll → Ln/Col */
  function updateScrollPos() {
    const el = document.getElementById('vsb-scroll-pos');
    if (!el) return;
    const totalH = document.documentElement.scrollHeight - window.innerHeight;
    const pct = totalH > 0 ? window.scrollY / totalH : 0;
    const totalLines = 2334; // lignes totales du portfolio
    const ln = Math.floor(pct * totalLines) + 1;
    el.textContent = `Ln ${ln.toLocaleString('fr-FR')}, Col 1`;
  }
  window.addEventListener('scroll', updateScrollPos, { passive: true });

  /* Langage selon la section visible */
  const langMap = {
    hero:        'HTML',
    projets:     'PHP',
    competences: 'JSON',
    timeline:    'Markdown',
    stages:      'PHP',
    veille:      'YAML',
    github:      'Git',
    contact:     'SMTP',
    'contact-form': 'HTML',
  };
  function updateLang() {
    const el = document.getElementById('vsb-lang-name');
    if (!el) return;
    const sections = document.querySelectorAll('section[id]');
    let current = 'HTML';
    sections.forEach(s => {
      if (window.scrollY >= s.offsetTop - 120) current = langMap[s.id] || 'HTML';
    });
    el.textContent = current;
  }
  window.addEventListener('scroll', updateLang, { passive: true });

})();
</script>
