<defs>
  <filter id="fsh" x="-30%" y="-20%" width="180%" height="170%">
    <feDropShadow dx="1.2" dy="1.8" stdDeviation="1.5" flood-color="rgba(0,0,0,0.55)"/>
  </filter>
  <radialGradient id="fbdg" cx="36%" cy="28%" r="68%">
    <stop offset="0%"   stop-color="#5ab8ff"/>
    <stop offset="100%" stop-color="#0b55cc"/>
  </radialGradient>
  <!-- Dégradé de la main : gris anthracite clair → foncé -->
  <linearGradient id="fhnd" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#7a7a80"/>
    <stop offset="100%" stop-color="#3c3c42"/>
  </linearGradient>
</defs>

<g filter="url(#fsh)">
  <!--
    MAIN WII — silhouette organique tracée en un seul path
    Vue de face, légèrement inclinée vers la gauche
    Index levé (pointe en haut), 3 autres doigts repliés en poing,
    pouce visible sur le côté gauche
    
    Proportions exactes image 2 :
    - Index : fin, long, occupe ~60% de la hauteur totale
    - Poing : large, carré-arrondi, occupe la moitié basse
    - Badge : petit, à droite du poing, même hauteur que le milieu du poing
  -->

  <!-- Silhouette noire extérieure (contour +1.5px de chaque côté) -->
  <path d="
    M 10 2
    C 10 0.5  12 0  13.5 0
    C 15 0    17 0.5  17 2
    L 17 18
    C 18 17.2  19.2 17  20.2 17.5
    C 21.5 18  22 19.2  22 20.5
    L 22 21.5
    C 22.8 20.8  24 20.6  25 21.2
    C 26.2 21.8  26.5 23  26.5 24
    L 26.5 25
    C 27.5 24.5  28.8 24.8  29.2 26
    C 29.8 27.2  29 29  29 30
    L 29 34
    C 29 38  25.5 41  21 41
    L 13 41
    C 9 41  6 38.5  6 35
    L 6 22
    C 6 20  7.5 18.5  9 18.5
    L 10 18.5
    Z
  " fill="#2a2a2f"/>

  <!-- Remplissage principal dégradé gris bleuté -->
  <path d="
    M 10.5 2.5
    C 10.5 1.2  12.2 0.8  13.5 0.8
    C 14.8 0.8  16.5 1.2  16.5 2.5
    L 16.5 18.2
    C 17.3 17.5  18.4 17.4  19.4 17.9
    C 20.5 18.4  21 19.5  21 20.6
    L 21 22
    C 21.8 21.3  22.8 21.2  23.8 21.8
    C 24.8 22.4  25.2 23.4  25.2 24.3
    L 25.2 25.5
    C 26.2 25  27.2 25.3  27.7 26.3
    C 28.2 27.3  27.8 28.8  27.8 29.8
    L 27.8 34
    C 27.8 37.2  24.8 40  21 40
    L 13 40
    C 9.5 40  7 37.8  7 35
    L 7 22
    C 7 20.4  8.2 19.2  9.2 19.2
    L 10.5 19.2
    Z
  " fill="url(#fhnd)"/>

  <!-- Séparation index / majeur (sillon entre les doigts) -->
  <path d="M 16.5 18 Q 17 21 17.5 22" 
    stroke="#1e1e22" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Séparation majeur / annulaire -->
  <path d="M 21 21 Q 21.5 23 22 24" 
    stroke="#1e1e22" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Séparation annulaire / auriculaire -->
  <path d="M 25.2 25 Q 25.5 26.5 26 28" 
    stroke="#1e1e22" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Jointure milieu de l'index -->
  <path d="M 10.7 12 Q 13.5 12.8 16.3 12" 
    stroke="rgba(255,255,255,0.18)" stroke-width="0.9" fill="none" stroke-linecap="round"/>

  <!-- Jointure base de l'index -->
  <path d="M 10.7 17 Q 13.5 17.8 16.3 17" 
    stroke="rgba(255,255,255,0.14)" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Ongle de l'index : teinte plus claire en haut -->
  <path d="M 11.2 2.5 C 11.2 1.1 13.5 0.6 13.5 0.6 C 13.5 0.6 15.8 1.1 15.8 2.5 L 15.8 6 C 15.8 7 14.8 7.6 13.5 7.6 C 12.2 7.6 11.2 7 11.2 6 Z"
    fill="rgba(255,255,255,0.2)"/>

  <!-- Reflet latéral gauche de l'index (brillance) -->
  <path d="M 11 3 L 11 16" 
    stroke="rgba(255,255,255,0.22)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Reflet général paume gauche -->
  <path d="M 7.5 23 L 7.5 34" 
    stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
</g>

<!-- BADGE "1" Wii — à droite de la main, taille proportionnelle -->
<g class="badge-group">
  <!-- Ombre -->
  <circle cx="29.5" cy="22.5" r="7.2" fill="rgba(0,0,0,0.25)"/>
  <!-- Bordure blanche -->
  <circle cx="28.8" cy="21.8" r="7.2" fill="white"/>
  <!-- Corps gradient bleu -->
  <circle cx="28.8" cy="21.8" r="6"   fill="url(#fbdg)"/>
  <!-- Highlight haut-gauche -->
  <ellipse cx="26.8" cy="19.2" rx="2.6" ry="1.5" fill="rgba(255,255,255,0.52)"/>
  <!-- "1" bold blanc -->
  <text x="28.8" y="26"
    text-anchor="middle"
    font-size="9"
    font-weight="900"
    fill="white"
    font-family="'Arial Black','Arial',sans-serif">1</text>
</g>

</svg>
</div>

<!-- Indicateur rayonnant style image 1 : 7 traits qui tournent -->
<div id="cur-arrow">
<svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gspn" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
